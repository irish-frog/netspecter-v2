<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">NetSpecter bridge network layout</title>
  <desc id="desc">Generic network diagram showing internet, router, NetSpecter bridge, switch, and LAN clients.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#14233a"/>
      <stop offset="1" stop-color="#0a1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#00ddc7"/>
      <stop offset="1" stop-color="#5ba8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="520" fill="#050b14"/>
  <rect x="34" y="34" width="1132" height="452" rx="24" fill="url(#panel)" stroke="#243a5a"/>
  <text x="70" y="86" fill="#f5f8ff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">Recommended NetSpecter Layout</text>
  <text x="70" y="122" fill="#9fb1cc" font-family="Inter, Arial, sans-serif" font-size="18">Transparent bridge for traffic visibility, AdGuard DNS for DNS analytics.</text>

  <g font-family="Inter, Arial, sans-serif" text-anchor="middle" filter="url(#shadow)">
    <g transform="translate(125 258)">
      <circle r="62" fill="#0d1c30" stroke="#00ddc7" stroke-width="3"/>
      <path d="M-28 8c12-42 44-42 56 0M-44 18c20-70 68-70 88 0M-12 0h24M0-28v56" fill="none" stroke="#5ba8ff" stroke-width="5" stroke-linecap="round"/>
      <text y="106" fill="#f5f8ff" font-size="20" font-weight="800">Internet</text>
    </g>
    <g transform="translate(335 258)">
      <rect x="-82" y="-60" width="164" height="120" rx="18" fill="#0d1c30" stroke="#2c4a70" stroke-width="3"/>
      <circle cx="-32" cy="-8" r="12" fill="#00ddc7"/>
      <circle cx="0" cy="-8" r="12" fill="#5ba8ff"/>
      <circle cx="32" cy="-8" r="12" fill="#f8c84e"/>
      <rect x="-44" y="22" width="88" height="12" rx="6" fill="#314867"/>
      <text y="106" fill="#f5f8ff" font-size="20" font-weight="800">Router</text>
      <text y="132" fill="#9fb1cc" font-size="15">Gateway</text>
    </g>
    <g transform="translate(600 258)">
      <rect x="-116" y="-70" width="232" height="140" rx="16" fill="#071827" stroke="#00ddc7" stroke-width="3"/>
      <rect x="-96" y="-46" width="192" height="64" rx="8" fill="#0d1c30" stroke="#2c4a70" stroke-width="2"/>
      <circle cx="-74" cy="-14" r="7" fill="#38f07b"/>
      <circle cx="-50" cy="-14" r="7" fill="#00ddc7"/>
      <circle cx="-26" cy="-14" r="7" fill="#5ba8ff"/>
      <rect x="10" y="-30" width="28" height="24" rx="4" fill="#111d2c" stroke="#5ba8ff" stroke-width="2"/>
      <rect x="48" y="-30" width="28" height="24" rx="4" fill="#111d2c" stroke="#5ba8ff" stroke-width="2"/>
      <rect x="-84" y="34" width="168" height="14" rx="7" fill="url(#accent)"/>
      <text y="64" fill="#f5f8ff" font-size="22" font-weight="900">NetSpecter</text>
      <text y="96" fill="#9fb1cc" font-size="15">bridge appliance</text>
      <text y="120" fill="#9fb1cc" font-size="15">Example IP: 192.168.1.10</text>
    </g>
    <g transform="translate(865 258)">
      <rect x="-82" y="-60" width="164" height="120" rx="18" fill="#0d1c30" stroke="#2c4a70" stroke-width="3"/>
      <rect x="-52" y="-22" width="104" height="44" rx="8" fill="#162a44" stroke="#5ba8ff"/>
      <circle cx="-30" cy="0" r="5" fill="#00ddc7"/>
      <circle cx="-10" cy="0" r="5" fill="#00ddc7"/>
      <circle cx="10" cy="0" r="5" fill="#00ddc7"/>
      <circle cx="30" cy="0" r="5" fill="#00ddc7"/>
      <text y="106" fill="#f5f8ff" font-size="20" font-weight="800">Switch</text>
      <text y="132" fill="#9fb1cc" font-size="15">LAN</text>
    </g>
    <g transform="translate(1075 258)">
      <rect x="-68" y="-54" width="136" height="108" rx="18" fill="#0d1c30" stroke="#2c4a70" stroke-width="3"/>
      <rect x="-38" y="-26" width="76" height="52" rx="8" fill="#172b45" stroke="#00ddc7"/>
      <rect x="-20" y="34" width="40" height="8" rx="4" fill="#314867"/>
      <text y="106" fill="#f5f8ff" font-size="20" font-weight="800">Clients</text>
      <text y="132" fill="#9fb1cc" font-size="15">PCs, phones, IoT</text>
    </g>
  </g>

  <g stroke="url(#accent)" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M190 258h62"/>
    <path d="M418 258h74"/>
    <path d="M708 258h75"/>
    <path d="M948 258h59"/>
  </g>
  <g fill="#9fb1cc" font-family="Inter, Arial, sans-serif" font-size="16">
    <text x="470" y="420">Router-facing NIC</text>
    <text x="685" y="420">LAN-facing NIC</text>
    <path d="M540 392v-48" stroke="#9fb1cc" stroke-width="2" stroke-dasharray="5 7"/>
    <path d="M690 392v-48" stroke="#9fb1cc" stroke-width="2" stroke-dasharray="5 7"/>
  </g>
</svg>
